<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-view</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="db-status" style="position:fixed;bottom:1px;left:50%;transform:translateX(-50%);color:#6f7f9b;padding:2px 10px;font-size:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;"></div>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img class="brand__logo" src="icon.png" alt="A-view">
        <div class="brand__copy">
          <div class="brand__title">A-view</div>
          <div class="brand__subtitle" data-i18n="brandSubtitle">OpenCode Ops Dashboard</div>
        </div>
        <div class="brand-status">
          <button class="lang-toggle" id="lang-toggle" title="Switch language">한/EN</button>
          <div class="sleep-indicator" id="sleep-indicator" title="Sleep prevention status">
            <span id="sleep-icon">⚪</span>
            <span id="sleep-label" data-i18n-default="sleepSystem">대기 중</span>
          </div>
          <span class="live"><span class="live__dot"></span><span data-i18n="polling" data-i18n-params='{"sec":"5"}'>Polling every 5s</span></span>
          <span id="last-refreshed">--</span>
          <div class="sleep-debug hidden" id="sleep-debug">
          <div class="sleep-debug__header">
            <span>SleepGuard</span>
            <span class="sleep-debug__close" id="sleep-debug-close">✕</span>
          </div>
          <div class="sleep-debug__body">
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" data-i18n="sleepStatus">상태</span>
              <span class="sleep-debug__val" id="dbg-preventing">—</span>
            </div>
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" data-i18n="sleepMode">모드</span>
              <span class="sleep-debug__val" id="dbg-mode">—</span>
            </div>
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" data-i18n="sleepActiveAgents">활성 에이전트</span>
              <span class="sleep-debug__val" id="dbg-agents">—</span>
            </div>
            <div class="sleep-debug__divider"></div>
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" data-i18n="sleepDisplay">화면 꺼짐 방지</span>
              <span class="sleep-debug__val" id="dbg-display">—</span>
            </div>
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" data-i18n="sleepIdle">시스템 대기 방지</span>
              <span class="sleep-debug__val" id="dbg-idle">—</span>
            </div>
            <div class="sleep-debug__divider"></div>
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" id="dbg-time-label" data-i18n="sleepStartTime">시작 시각</span>
              <span class="sleep-debug__val" id="dbg-time">—</span>
            </div>
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" id="dbg-duration-label" data-i18n="sleepDuration">유지 시간</span>
              <span class="sleep-debug__val" id="dbg-duration">—</span>
            </div>
            <div class="sleep-debug__divider"></div>
            <div class="sleep-debug__row sleep-debug__row--countdown">
              <span class="sleep-debug__key" data-i18n="sleepNextCheck">다음 체크</span>
              <span class="sleep-debug__val" id="dbg-countdown">—</span>
            </div>
            <div class="sleep-debug__row">
              <span class="sleep-debug__key" data-i18n="sleepExpect">예상</span>
              <span class="sleep-debug__val" id="dbg-expect">—</span>
            </div>
            <div class="sleep-debug__divider"></div>
            <button class="sleep-debug__toggle" id="sleep-manual-toggle">수동 끄기</button>
          </div>
          </div>
        </div>
      </div>

      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="dashboard" data-i18n="tabDashboard">Dashboard</button>
        <button class="tab-btn" data-tab="portkiller" data-i18n="tabPortKiller">Port Killer</button>
      </nav>

      <div class="kpi-row">
        <section class="kpi-card kpi-card--running">
          <div class="kpi-card__label" data-i18n="runningAgents">Running Agents</div>
          <div class="kpi-card__value" id="running-agents">0</div>
        </section>
        <section class="kpi-card kpi-card--stalled">
          <div class="kpi-card__label" data-i18n="suspectedStalled">Suspected Stalled</div>
          <div class="kpi-card__value" id="stalled-agents">0</div>
        </section>
      </div>

    </header>

    <div id="tab-dashboard" class="tab-content">
    <main class="layout">
      <aside class="panel panel--projects">
        <div class="panel__header">
          <div>
            <div class="panel__eyebrow" data-i18n="projects">Projects</div>
            <div class="panel__title" id="project-count">0 projects</div>
          </div>
        </div>
        <div class="projects-list" id="projects-list"></div>
      </aside>

      <section class="panel panel--center">
        <div class="sessions-main" id="sessions-main"></div>
      </section>

      <aside class="panel panel--detail" id="detail-panel">
        <div class="panel--detail-scroll">
          <div class="empty-state" data-i18n="selectAgent">에이전트를 선택하면 상세가 표시됩니다.</div>
        </div>
      </aside>
    </main>
    </div>

    <div id="tab-portkiller" class="tab-content hidden">
      <div class="port-header">
        <input class="port-search" id="port-search" type="text" data-i18n-placeholder="portSearch" placeholder="포트 또는 프로세스 검색...">
        <button class="port-refresh-btn" id="port-refresh" data-i18n="portRefresh">새로고침</button>
      </div>
      <div class="port-layout">
        <aside class="port-filter">
          <div class="port-filter__header" data-i18n="portCategoryFilter">분류 필터</div>
          <label class="port-filter__item port-filter__item--all">
            <input type="checkbox" id="cat-all" data-category="all" checked>
            <span class="port-filter__check"></span>
            <span class="port-filter__label" data-i18n="portAll">전체</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="web_server">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--web_server">Web</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="database">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--database">DB</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="development">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--development">Dev</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="system">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--system">Sys</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="other">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--other" data-i18n="portOther">기타</span>
          </label>
          <div class="port-filter__count" id="port-filter-count"></div>
        </aside>
        <div class="port-main">
          <div class="port-table-wrap">
            <table class="port-table">
              <thead>
                <tr>
                  <th data-i18n="portColumnPort">포트</th>
                  <th data-i18n="portColumnProcess">프로세스</th>
                  <th>PID</th>
                  <th data-i18n="portColumnCategory">분류</th>
                  <th data-i18n="portColumnAction">동작</th>
                </tr>
              </thead>
              <tbody id="port-table-body">
                <tr><td colspan="5" class="port-empty" data-i18n="portScanning">포트를 스캔하는 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
