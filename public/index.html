<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-view</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="db-status" style="position:fixed;bottom:1px;left:50%;transform:translateX(-50%);color:#6f7f9b;padding:2px 10px;font-size:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;"></div>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img class="brand__logo" src="icon.png" alt="A-view">
        <div>
          <div class="brand__title">A-view</div>
          <div class="brand__subtitle">OpenCode Ops Dashboard</div>
        </div>
      </div>

      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
        <button class="tab-btn" data-tab="portkiller">Port Killer</button>
      </nav>

      <div class="kpi-row">
        <section class="kpi-card kpi-card--running">
          <div class="kpi-card__label">Running Agents</div>
          <div class="kpi-card__value" id="running-agents">0</div>
        </section>
        <section class="kpi-card kpi-card--stalled">
          <div class="kpi-card__label">Suspected Stalled</div>
          <div class="kpi-card__value" id="stalled-agents">0</div>
        </section>
      </div>

      <div class="meta-status">
        <div class="sleep-indicator" id="sleep-indicator" title="Sleep prevention status">
          <span id="sleep-icon">⚪</span>
          <span id="sleep-label">대기 중</span>
        </div>
        <div class="live"><span class="live__dot"></span><span>Polling every 5s</span></div>
        <div id="last-refreshed">--</div>
      </div>
    </header>

    <div id="tab-dashboard" class="tab-content">
    <main class="layout">
      <aside class="panel panel--projects">
        <div class="panel__header">
          <div>
            <div class="panel__eyebrow">Projects</div>
            <div class="panel__title" id="project-count">0 projects</div>
          </div>
        </div>
        <div class="projects-list" id="projects-list"></div>
      </aside>

      <section class="panel panel--center">
        <div class="sessions-main" id="sessions-main"></div>
      </section>

      <aside class="panel panel--detail" id="detail-panel">
        <div class="panel--detail-scroll">
          <div class="empty-state">에이전트를 선택하면 상세가 표시됩니다.</div>
        </div>
      </aside>
    </main>
    </div>

    <div id="tab-portkiller" class="tab-content hidden">
      <div class="port-header">
        <input class="port-search" id="port-search" type="text" placeholder="포트 또는 프로세스 검색...">
        <button class="port-refresh-btn" id="port-refresh">새로고침</button>
      </div>
      <div class="port-layout">
        <aside class="port-filter">
          <div class="port-filter__header">분류 필터</div>
          <label class="port-filter__item port-filter__item--all">
            <input type="checkbox" id="cat-all" data-category="all" checked>
            <span class="port-filter__check"></span>
            <span class="port-filter__label">전체</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="web_server">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--web_server">Web</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="database">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--database">DB</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="development">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--development">Dev</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="system">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--system">Sys</span>
          </label>
          <label class="port-filter__item">
            <input type="checkbox" data-category="other">
            <span class="port-filter__check"></span>
            <span class="port-filter__label cat-dot cat-dot--other">기타</span>
          </label>
          <div class="port-filter__count" id="port-filter-count"></div>
        </aside>
        <div class="port-main">
          <div class="port-table-wrap">
            <table class="port-table">
              <thead>
                <tr>
                  <th>포트</th>
                  <th>프로세스</th>
                  <th>PID</th>
                  <th>분류</th>
                  <th>동작</th>
                </tr>
              </thead>
              <tbody id="port-table-body">
                <tr><td colspan="5" class="port-empty">포트를 스캔하는 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
