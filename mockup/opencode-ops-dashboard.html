<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode Ops Dashboard</title>
<style>
/* ==========================================================================
   DESIGN TOKENS
   ========================================================================== */
:root {
  /* Surfaces */
  --bg-base:        #06090f;
  --bg-surface:     #0c1220;
  --bg-elevated:    #121c30;
  --bg-hover:       #182440;
  --bg-active:      #1e2d50;

  /* Borders */
  --border-subtle:  #1a2540;
  --border-default: #243050;
  --border-focus:   #3b4f78;

  /* Text */
  --text-primary:   #e8edf5;
  --text-secondary: #8899b8;
  --text-tertiary:  #546483;
  --text-inverse:   #06090f;

  /* Accent */
  --accent:         #e5a00d;
  --accent-dim:     #c4880a;
  --accent-subtle:  rgba(229,160,13,0.12);
  --accent-glow:    rgba(229,160,13,0.25);

  /* Status */
  --status-running:   #2dd4bf;
  --status-delayed:   #fbbf24;
  --status-stalled:   #f87171;
  --status-completed: #34d399;
  --status-failed:    #fb7185;

  /* Status BG (for badges) */
  --bg-running:   rgba(45,212,191,0.12);
  --bg-delayed:   rgba(251,191,36,0.12);
  --bg-stalled:   rgba(248,113,113,0.12);
  --bg-completed: rgba(52,211,153,0.10);
  --bg-failed:    rgba(251,113,133,0.12);

  /* Spacing */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;   --sp-10: 40px;

  /* Radii */
  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  14px;

  /* Typography */
  --font-sans: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, Consolas, monospace;

  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4,0,0.2,1);
  --transition-base: 250ms cubic-bezier(0.4,0,0.2,1);

  /* Layout */
  --panel-left:  300px;
  --panel-right: 360px;
  --kpi-height:  72px;
}

/* ==========================================================================
   RESET & BASE
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

/* ==========================================================================
   APP SHELL
   ========================================================================== */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ==========================================================================
   TOP KPI BAR
   ========================================================================== */
.kpi-bar {
  display: flex;
  align-items: center;
  height: var(--kpi-height);
  padding: 0 var(--sp-6);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  gap: var(--sp-8);
  flex-shrink: 0;
}

.kpi-bar__brand {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-right: auto;
}

.kpi-bar__logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), #d4790a);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: var(--text-inverse);
  letter-spacing: -0.5px;
}

.kpi-bar__title {
  font-size: 16px;
  font-weight: 650;
  letter-spacing: -0.3px;
  color: var(--text-primary);
}

.kpi-bar__subtitle {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 600;
}

.kpi-card {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-5);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  min-width: 180px;
  transition: border-color var(--transition-fast);
}

.kpi-card:hover { border-color: var(--border-focus); }

.kpi-card__icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.kpi-card__icon--running {
  background: var(--bg-running);
  color: var(--status-running);
}

.kpi-card__icon--stalled {
  background: var(--bg-stalled);
  color: var(--status-stalled);
  animation: pulse-stall 2s ease-in-out infinite;
}

@keyframes pulse-stall {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

.kpi-card__value {
  font-size: 24px;
  font-weight: 750;
  line-height: 1.1;
  letter-spacing: -0.5px;
}

.kpi-card__label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 600;
}

.kpi-bar__time {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-weight: 500;
  margin-left: var(--sp-2);
}

.kpi-bar__live-dot {
  width: 7px; height: 7px;
  background: var(--status-running);
  border-radius: 50%;
  animation: pulse-live 1.8s ease-in-out infinite;
  margin-right: var(--sp-2);
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45,212,191,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(45,212,191,0); }
}

/* ==========================================================================
   MAIN CONTENT AREA
   ========================================================================== */
.main-content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ==========================================================================
   LEFT PANEL — Sessions
   ========================================================================== */
.panel-sessions {
  width: var(--panel-left);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.panel-header__title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-secondary);
}

.panel-header__count {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  background: var(--bg-elevated);
  padding: 2px 8px;
  border-radius: 10px;
}

.sessions-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-2);
}

.session-item {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  border: 1px solid transparent;
  margin-bottom: 2px;
}

.session-item:hover {
  background: var(--bg-hover);
  border-color: var(--border-subtle);
}

.session-item--active {
  background: var(--bg-elevated);
  border-color: var(--border-focus);
}

.session-item--active:hover {
  background: var(--bg-active);
}

.session-item__top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-1);
}

.session-item__name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 170px;
}

.session-item__time {
  font-size: 11px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  white-space: nowrap;
  flex-shrink: 0;
}

.session-item__id {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  margin-bottom: var(--sp-2);
}

.session-item__agents {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.agent-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.agent-dot--running   { background: var(--status-running); }
.agent-dot--delayed   { background: var(--status-delayed); }
.agent-dot--stalled   { background: var(--status-stalled); animation: pulse-stall 2s ease-in-out infinite; }
.agent-dot--completed { background: var(--status-completed); opacity: 0.5; }
.agent-dot--failed    { background: var(--status-failed); opacity: 0.7; }

.session-item__meta {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-2);
  font-size: 11px;
  color: var(--text-tertiary);
}

.session-item__agent-count {
  color: var(--text-secondary);
}

.session-item__stall-flag {
  color: var(--status-stalled);
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ==========================================================================
   CENTER PANEL — Agent Status Board
   ========================================================================== */
.panel-agents {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-base);
}

.agents-header {
  padding: var(--sp-5) var(--sp-6);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.agents-header__session-name {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: var(--sp-1);
}

.agents-header__session-id {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
}

.agents-header__meta {
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  margin-top: var(--sp-3);
}

.agents-header__badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}

.agents-header__badge--running {
  background: var(--bg-running);
  color: var(--status-running);
}

.agents-header__badge--stalled {
  background: var(--bg-stalled);
  color: var(--status-stalled);
}

.agents-header__badge--delayed {
  background: var(--bg-delayed);
  color: var(--status-delayed);
}

.agents-header__badge--completed {
  background: var(--bg-completed);
  color: var(--status-completed);
}

.agents-header__badge--failed {
  background: var(--bg-failed);
  color: var(--status-failed);
}

.agents-header__duration {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
}

/* Agent cards grid */
.agents-grid {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-4) var(--sp-5);
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--sp-3);
  align-content: start;
}

.agent-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: var(--sp-4);
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  overflow: hidden;
}

.agent-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 0 2px 2px 0;
}

.agent-card--running::before   { background: var(--status-running); }
.agent-card--delayed::before   { background: var(--status-delayed); }
.agent-card--stalled::before   { background: var(--status-stalled); }
.agent-card--completed::before { background: var(--status-completed); }
.agent-card--failed::before    { background: var(--status-failed); }

.agent-card:hover {
  border-color: var(--border-focus);
  background: var(--bg-elevated);
  transform: translateY(-1px);
}

.agent-card--active {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 1px var(--accent-glow), 0 4px 16px rgba(0,0,0,0.3);
}

.agent-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-3);
}

.agent-card__name {
  font-size: 14px;
  font-weight: 650;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.agent-card__type-icon {
  font-size: 16px;
  opacity: 0.7;
}

.agent-card__status {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 2px 8px;
  border-radius: 4px;
}

.agent-card__status--running   { background: var(--bg-running);   color: var(--status-running); }
.agent-card__status--delayed   { background: var(--bg-delayed);   color: var(--status-delayed); }
.agent-card__status--stalled   { background: var(--bg-stalled);   color: var(--status-stalled); }
.agent-card__status--completed { background: var(--bg-completed); color: var(--status-completed); }
.agent-card__status--failed    { background: var(--bg-failed);    color: var(--status-failed); }

.agent-card__model {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  margin-bottom: var(--sp-3);
}

.agent-card__task {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.45;
  margin-bottom: var(--sp-3);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.agent-card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-tertiary);
}

.agent-card__duration {
  font-family: var(--font-mono);
}

.agent-card__tools {
  display: flex;
  gap: var(--sp-1);
}

.agent-card__tool-badge {
  font-size: 10px;
  padding: 1px 6px;
  background: var(--bg-elevated);
  border-radius: 3px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
}

/* ==========================================================================
   RIGHT PANEL — Agent Detail + Logs
   ========================================================================== */
.panel-detail {
  width: var(--panel-right);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-left: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-header {
  padding: var(--sp-5) var(--sp-5) var(--sp-4);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.detail-header__name {
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: var(--sp-2);
}

.detail-header__status {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 2px 8px;
  border-radius: 4px;
}

.detail-header__model {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  margin-bottom: var(--sp-3);
}

.detail-header__task {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  padding: var(--sp-3);
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
}

.detail-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-2);
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.detail-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.detail-stat__label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-tertiary);
  font-weight: 600;
}

.detail-stat__value {
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-mono);
}

.detail-stat__value--accent { color: var(--accent); }
.detail-stat__value--teal   { color: var(--status-running); }
.detail-stat__value--red    { color: var(--status-stalled); }

/* Logs section */
.logs-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.logs-header {
  padding: var(--sp-3) var(--sp-5);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.logs-header__title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-secondary);
}

.logs-header__count {
  font-size: 11px;
  color: var(--text-tertiary);
}

.logs-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 var(--sp-3) var(--sp-4);
}

.log-entry {
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--radius-sm);
  margin-bottom: 2px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.55;
  transition: background var(--transition-fast);
}

.log-entry:hover {
  background: var(--bg-elevated);
}

.log-entry__time {
  color: var(--text-tertiary);
  margin-right: var(--sp-2);
  font-size: 10.5px;
}

.log-entry__level {
  font-weight: 700;
  margin-right: var(--sp-2);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.log-entry__level--info    { color: var(--status-running); }
.log-entry__level--warn    { color: var(--status-delayed); }
.log-entry__level--error   { color: var(--status-stalled); }
.log-entry__level--tool    { color: var(--accent); }
.log-entry__level--success { color: var(--status-completed); }

.log-entry__msg {
  color: var(--text-secondary);
  word-break: break-word;
}

/* ==========================================================================
   EMPTY STATE
   ========================================================================== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-tertiary);
  text-align: center;
  padding: var(--sp-8);
}

.empty-state__icon {
  font-size: 36px;
  margin-bottom: var(--sp-4);
  opacity: 0.4;
}

.empty-state__text {
  font-size: 13px;
  line-height: 1.6;
}

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */
@media (max-width: 1100px) {
  :root {
    --panel-left: 250px;
    --panel-right: 300px;
  }
  .agents-grid {
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
}

@media (max-width: 860px) {
  :root {
    --panel-left: 220px;
    --panel-right: 0px;
  }
  .panel-detail { display: none; }
  .kpi-card { min-width: 140px; padding: var(--sp-2) var(--sp-3); }
  .kpi-card__value { font-size: 20px; }
}

@media (max-width: 640px) {
  .main-content { flex-direction: column; }
  .panel-sessions { width: 100%; height: 200px; border-right: none; border-bottom: 1px solid var(--border-subtle); }
  .panel-agents { flex: 1; }
  .agents-grid { grid-template-columns: 1fr; }
  .kpi-bar { padding: 0 var(--sp-3); gap: var(--sp-3); }
  .kpi-bar__title { display: none; }
}

/* ==========================================================================
   AMBIENT BACKGROUND
   ========================================================================== */
.app::before {
  content: '';
  position: fixed;
  top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(229,160,13,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.app::after {
  content: '';
  position: fixed;
  bottom: -200px; left: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(45,212,191,0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.kpi-bar, .main-content { position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="app">

  <header class="kpi-bar">
    <div class="kpi-bar__brand">
      <div class="kpi-bar__logo">OC</div>
      <div>
        <div class="kpi-bar__title">OpenCode</div>
        <div class="kpi-bar__subtitle">Operations</div>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-card__icon kpi-card__icon--running">
        <span>&#9654;</span>
      </div>
      <div>
        <div class="kpi-card__value" id="kpi-running">7</div>
        <div class="kpi-card__label">Running Agents</div>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-card__icon kpi-card__icon--stalled">
        <span>&#9632;</span>
      </div>
      <div>
        <div class="kpi-card__value" id="kpi-stalled">2</div>
        <div class="kpi-card__label">Suspected Stalled</div>
      </div>
    </div>

    <div style="display:flex; align-items:center; margin-left:auto;">
      <div class="kpi-bar__live-dot"></div>
      <span class="kpi-bar__time" id="clock">--:--:--</span>
    </div>
  </header>

  <div class="main-content">

    <aside class="panel-sessions">
      <div class="panel-header">
        <span class="panel-header__title">Sessions</span>
        <span class="panel-header__count" id="session-count">6</span>

function renderSessionsList() {
  const container = document.getElementById('sessions-list');
  container.innerHTML = SESSIONS.map(s => {
    const hasStalled = s.agents.some(a => a.status === 'stalled');
    const runningCount = s.agents.filter(a => a.status === 'running').length;
    return `
      <div class="session-item ${s.id === activeSessionId ? 'session-item--active' : ''}"
           onclick="selectSession('${s.id}')">
        <div class="session-item__top">
          <span class="session-item__name">${s.name}</span>
          <span class="session-item__time">${s.startedAt}</span>
        </div>
        <div class="session-item__id">${s.id}</div>
        <div class="session-item__agents">
          ${s.agents.map(a => `<div class="agent-dot agent-dot--${a.status}" title="${a.name}: ${a.status}"></div>`).join('')}
        </div>
        <div class="session-item__meta">
          <span class="session-item__agent-count">${s.agents.length} agent${s.agents.length !== 1 ? 's' : ''}</span>
          <span>&middot;</span>
          <span>${s.duration}</span>
          ${hasStalled ? '<span class="session-item__stall-flag">&#9888; stalled</span>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderAgentsHeader(session) {
  const container = document.getElementById('agents-header');
  const statusCounts = {};
  session.agents.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });

  const badges = Object.entries(statusCounts).map(([status, count]) =>
    `<span class="agents-header__badge agents-header__badge--${status}">${count} ${status}</span>`
  ).join('');

  container.innerHTML = `
    <div class="agents-header__session-name">${session.name}</div>
    <div class="agents-header__session-id">${session.id}</div>
    <div class="agents-header__meta">
      ${badges}
      <span class="agents-header__duration">${session.duration}</span>
    </div>
  `;
}

function renderAgentsGrid(session) {
  const container = document.getElementById('agents-grid');
  container.innerHTML = session.agents.map(a => `
    <div class="agent-card agent-card--${a.status} ${activeAgentName === a.name && activeSessionId === session.id ? 'agent-card--active' : ''}"
         onclick="selectAgent('${session.id}', '${a.name}')">
      <div class="agent-card__header">
        <div class="agent-card__name">
          <span class="agent-card__type-icon">${a.icon}</span>
          ${a.name}
        </div>
        <span class="agent-card__status agent-card__status--${a.status}">${a.status}</span>
      </div>
      <div class="agent-card__model">${a.model}</div>
      <div class="agent-card__task">${a.task}</div>
      <div class="agent-card__footer">
        <span class="agent-card__duration">${a.duration}${a.lastEvent !== 'completed' && a.lastEvent !== 'failed' ? ' &middot; last: ' + a.lastEvent : ''}</span>
        <div class="agent-card__tools">
          ${a.tools.slice(0, 3).map(t => `<span class="agent-card__tool-badge">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderAgentDetail(session, agentName) {
  const agent = session.agents.find(a => a.name === agentName);
  if (!agent) return;

  const container = document.getElementById('panel-detail');
  container.innerHTML = `
    <div class="detail-header">
      <div class="detail-header__name">
        <span>${agent.icon}</span>
        ${agent.name}
        <span class="detail-header__status agent-card__status--${agent.status}">${agent.status}</span>
      </div>
      <div class="detail-header__model">${agent.model}</div>
      <div class="detail-header__task">${agent.task}</div>
    </div>

    <div class="detail-stats">
      <div class="detail-stat">
        <span class="detail-stat__label">Duration</span>
        <span class="detail-stat__value detail-stat__value--teal">${agent.duration}</span>
      </div>
      <div class="detail-stat">
        <span class="detail-stat__label">Last Event</span>
        <span class="detail-stat__value ${agent.lastEvent.includes('ago') && parseInt(agent.lastEvent) > 45 ? 'detail-stat__value--red' : ''}">${agent.lastEvent}</span>
      </div>
      <div class="detail-stat">
        <span class="detail-stat__label">Tools Used</span>
        <span class="detail-stat__value">${agent.tools.join(', ')}</span>
      </div>
      <div class="detail-stat">
        <span class="detail-stat__label">Log Entries</span>
        <span class="detail-stat__value detail-stat__value--accent">${agent.logs.length}</span>
      </div>
    </div>

    <div class="logs-section">
      <div class="logs-header">
        <span class="logs-header__title">Recent Logs</span>
        <span class="logs-header__count">${agent.logs.length} entries</span>
      </div>
      <div class="logs-list">
        ${agent.logs.map(l => `
          <div class="log-entry">
            <span class="log-entry__time">${l.time}</span>
            <span class="log-entry__level log-entry__level--${l.level}">${l.level.padEnd(7)}</span>
            <span class="log-entry__msg">${l.msg}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderEmptyDetail() {
  document.getElementById('panel-detail').innerHTML = `
    <div class="empty-state">
      <div class="empty-state__icon">&#128269;</div>
      <div class="empty-state__text">Select an agent to view<br>details and recent logs</div>
    </div>
  `;
}

function renderAll() {
  const session = SESSIONS.find(s => s.id === activeSessionId) || SESSIONS[0];
  renderSessionsList();
  renderAgentsHeader(session);
  renderAgentsGrid(session);

  if (activeAgentName) {
    const agent = session.agents.find(a => a.name === activeAgentName);
    if (agent) {
      renderAgentDetail(session, activeAgentName);
    } else {
      activeAgentName = null;
      renderEmptyDetail();
    }
  } else {
    renderEmptyDetail();
  }
  updateKPIs();
}

// ============================================================================
// ACTIONS
// ============================================================================

function selectSession(sessionId) {
  activeSessionId = sessionId;
  activeAgentName = null;
  renderAll();
}

function selectAgent(sessionId, agentName) {
  activeSessionId = sessionId;
  activeAgentName = agentName;
  renderAll();
}

// ============================================================================
// KPI + CLOCK
// ============================================================================

function updateKPIs() {
  const running = SESSIONS.reduce((sum, s) => sum + s.agents.filter(a => a.status === 'running').length, 0);
  const stalled = SESSIONS.reduce((sum, s) => sum + s.agents.filter(a => a.status === 'stalled').length, 0);
  document.getElementById('kpi-running').textContent = running;
  document.getElementById('kpi-stalled').textContent = stalled;
  document.getElementById('session-count').textContent = SESSIONS.length;
}

function updateClock() {
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2, '0')).join(':');
  document.getElementById('clock').textContent = t;
}

// ============================================================================
// INIT
// ============================================================================

renderAll();
updateClock();
setInterval(updateClock, 1000);
</script>
