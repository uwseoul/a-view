name: Build & Release

on:
  push:
    branches:
      - feat/tauri
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (portable)
        run: cargo tauri build --no-bundle

      - name: Rename portable binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXE_PATH="src-tauri/target/release/opencode-ops-dashboard.exe"
            if [ -f "$EXE_PATH" ]; then
              mv "$EXE_PATH" "src-tauri/target/release/a-view-portable.exe"
              echo "Portable exe: a-view-portable.exe"
              ls -lh src-tauri/target/release/a-view-portable.exe
            else
              echo "ERROR: $EXE_PATH not found"
              ls src-tauri/target/release/*.exe 2>/dev/null || true
              exit 1
            fi
          elif [ "$RUNNER_OS" = "macOS" ]; then
            BIN_PATH="src-tauri/target/release/opencode-ops-dashboard"
            if [ -f "$BIN_PATH" ]; then
              mv "$BIN_PATH" "src-tauri/target/release/a-view-portable-macos"
              echo "Portable binary: a-view-portable-macos"
              ls -lh src-tauri/target/release/a-view-portable-macos
            else
              echo "ERROR: $BIN_PATH not found"
              ls src-tauri/target/release/opencode-ops-dashboard* 2>/dev/null || true
              exit 1
            fi
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-portable
          path: |
            src-tauri/target/release/a-view-portable.exe
            src-tauri/target/release/a-view-portable-macos
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=latest" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: artifacts/**/*
