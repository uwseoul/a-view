name: Build & Release

on:
  push:
    branches:
      - main
      - feat/tauri
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build portable binary
        run: cargo tauri build --no-bundle

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            SRC="src-tauri/target/release/a-view.exe"
            if [ ! -f "$SRC" ]; then
              echo "ERROR: $SRC not found"
              ls src-tauri/target/release/*.exe 2>/dev/null || true
              exit 1
            fi
            mv "$SRC" "src-tauri/target/release/a-view-${{ github.ref_name }}-windows-x64.exe"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            SRC="src-tauri/target/release/a-view"
            if [ ! -f "$SRC" ]; then
              echo "ERROR: $SRC not found"
              ls src-tauri/target/release/a-view* 2>/dev/null || true
              exit 1
            fi
            mv "$SRC" "src-tauri/target/release/a-view-${{ github.ref_name }}-macos-arm64"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-portable
          path: |
            src-tauri/target/release/a-view-*.exe
            src-tauri/target/release/a-view-*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/**/*
